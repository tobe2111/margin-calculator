    <script>
    const terms = [
        { group: 'A', name: 'ACoS', abbr: 'Advertising Cost of Sale', def: '광고비 매출 비율. 광고비 ÷ 광고 매출 × 100. 아마존 광고 지표로, ACoS가 낮을수록 광고 효율이 좋다는 의미입니다.', example: '광고비 10만원으로 40만원 매출 → ACoS = 25%' },
        { group: 'A', name: 'AOV', abbr: 'Average Order Value', def: '평균 주문 금액. 총 매출 ÷ 주문 건수. AOV를 높이면 같은 고객 수로 더 많은 매출을 올릴 수 있습니다.', example: '월 매출 500만원, 주문 100건 → AOV = 5만원' },
        { group: 'B', name: 'BEP', abbr: 'Break-Even Point', def: '손익분기점. 총 비용(고정비 + 변동비)과 총 수익이 같아지는 판매량 또는 매출액 지점. BEP 이후 판매부터 실제 이익이 발생합니다.', example: '고정비 100만원, 공헌이익 2만원/개 → BEP = 50개' },
        { group: 'B', name: 'B2B / B2C', abbr: 'Business-to-Business / Business-to-Consumer', def: 'B2B는 기업 간 거래, B2C는 기업과 소비자 간 거래. 해외 셀러 대부분은 B2C 방식으로 플랫폼을 통해 최종 소비자에게 판매합니다.', example: '아마존 마켓플레이스 → B2C / 알리바바 도매 → B2B' },
        { group: 'C', name: 'CPA', abbr: 'Cost Per Acquisition', def: '전환 1건을 달성하는 데 든 광고비. 총 광고비 ÷ 전환 수. CPA가 낮을수록 광고 효율이 높습니다.', example: '광고비 30만원, 전환 10건 → CPA = 3만원' },
        { group: 'C', name: 'CPC', abbr: 'Cost Per Click', def: '클릭 1회에 든 광고비. 총 광고비 ÷ 클릭 수. PPC(클릭당 과금) 광고에서 핵심 지표입니다.', example: '광고비 10만원, 클릭 500회 → CPC = 200원' },
        { group: 'C', name: 'CVR', abbr: 'Conversion Rate', def: '전환율. 방문자 중 실제 구매로 이어진 비율. 일반 이커머스의 평균 CVR은 2~5%입니다.', example: '방문 1,000명 중 구매 30명 → CVR = 3%' },
        { group: 'C', name: 'CTR', abbr: 'Click-Through Rate', def: '클릭률. 광고 노출 대비 클릭 비율. CTR이 높을수록 광고 소재가 매력적임을 의미합니다.', example: '노출 10,000회, 클릭 200회 → CTR = 2%' },
        { group: 'D', name: 'D2C', abbr: 'Direct-to-Consumer', def: '제조사 또는 브랜드가 중간 유통단계 없이 소비자에게 직접 판매하는 방식. 자사몰 운영이 대표적입니다.', example: '자체 쇼핑몰, 브랜드 인스타그램에서 직접 판매' },
        { group: 'D', name: 'DSR', abbr: 'Detailed Seller Ratings', def: '이베이의 세부 판매자 평가. 상품 설명 정확도, 커뮤니케이션, 배송 속도, 배송비 합리성 4개 항목으로 평가됩니다.', example: '이베이에서 DSR 4.5 이상 유지 시 Top Rated Seller 자격' },
        { group: 'F', name: 'FBA', abbr: 'Fulfillment by Amazon', def: '아마존 물류 대행 서비스. 판매자가 상품을 아마존 창고에 입고하면 아마존이 보관·포장·배송·반품처리를 대행합니다. Prime 배지 획득 가능.', example: '상품을 FBA 창고에 발송 → 고객 주문 시 아마존이 배송' },
        { group: 'F', name: 'FBM', abbr: 'Fulfillment by Merchant', def: '판매자 직접 배송. 아마존에 등록 후 판매자가 직접 재고 관리와 배송을 담당합니다. FBA 수수료가 없지만 Prime 배지는 없습니다.', example: '한국에서 미국 고객에게 직접 EMS·DHL로 발송' },
        { group: 'F', name: 'FBL', abbr: 'Fulfilled by Lazada', def: '라자다 물류 대행 서비스. 아마존 FBA와 유사하게 라자다 창고에 입고 후 라자다가 배송합니다.', example: '라자다 입점 후 FBL 활성화' },
        { group: 'F', name: 'FBT', abbr: 'Fulfilled by TikTok', def: '틱톡샵의 물류 대행 서비스. TikTok Shop에 입고하면 틱톡이 배송합니다.', example: '틱톡샵 FBT 창고에 재고 입고' },
        { group: 'F', name: 'FX Spread', abbr: 'Foreign Exchange Spread', def: '환전 수수료. 은행이나 결제 서비스(페이오니아 등)가 환전 시 기준환율과 실제 적용환율의 차이로 가져가는 수수료. 보통 1% 내외.', example: '기준환율 1,380원인데 실제 1,366원 적용 → 스프레드 1%' },
        { group: 'G', name: 'GMV', abbr: 'Gross Merchandise Value', def: '총상품거래액. 플랫폼이나 셀러 스토어에서 일정 기간 거래된 상품의 총 가치(반품 전). 매출과 다르게 실제 결제금액 기준.', example: '월 GMV 1억 → 총 판매 상품 금액이 1억원' },
        { group: 'K', name: 'KPI', abbr: 'Key Performance Indicator', def: '핵심 성과 지표. 비즈니스 목표 달성을 측정하기 위한 수치. ROAS, CVR, 매출 성장률, 마진율 등이 셀러의 주요 KPI입니다.', example: '이번 달 KPI: 매출 1,000만원, 마진율 25% 이상' },
        { group: 'M', name: 'MOQ', abbr: 'Minimum Order Quantity', def: '최소 주문 수량. 제조사나 도매상이 설정하는 최소 구매 단위. MOQ가 높을수록 단가는 낮지만 초기 재고 부담이 큽니다.', example: 'MOQ 100개 → 최소 100개를 주문해야 함' },
        { group: 'P', name: 'PPC', abbr: 'Pay Per Click', def: '클릭당 과금 광고 방식. 아마존 Sponsored Products, 구글 쇼핑 광고 등이 대표적. 클릭이 발생할 때만 광고비가 청구됩니다.', example: '아마존 Sponsored Products = PPC 광고' },
        { group: 'R', name: 'ROI', abbr: 'Return on Investment', def: '투자 수익률. (순이익 ÷ 투자비용) × 100. 투입한 자본 대비 얼마나 수익을 냈는지 측정.', example: '100만원 투자 → 130만원 회수 → ROI = 30%' },
        { group: 'R', name: 'ROAS', abbr: 'Return on Ad Spend', def: '광고비 대비 매출. (광고 매출 ÷ 광고비) × 100. ROAS 300% = 광고비의 3배 매출 달성.', example: '광고비 50만원으로 150만원 매출 → ROAS = 300%' },
        { group: 'S', name: 'SKU', abbr: 'Stock Keeping Unit', def: '재고 관리 단위. 상품을 고유하게 식별하는 코드. 같은 상품도 색상·사이즈·옵션이 다르면 별도 SKU로 관리합니다.', example: '빨간 티셔츠 M → SKU: TSHIRT-RED-M' },
        { group: 'S', name: 'SLA', abbr: 'Service Level Agreement', def: '서비스 수준 협약. 플랫폼에서 규정한 배송 시간, 처리 기한 등의 기준. SLA 위반 시 페널티 부여.', example: 'Shopee SLA: 주문 후 2일 내 발송 의무' },
        { group: 'T', name: 'TACoS', abbr: 'Total Advertising Cost of Sale', def: '총 매출 대비 광고비 비율. 아마존에서 광고 매출뿐 아니라 전체 매출 대비 광고비 효율을 측정.', example: '총 매출 100만원, 광고비 15만원 → TACoS = 15%' },
        { group: '가', name: '공헌이익', abbr: '', def: '판매가에서 변동비를 뺀 금액. 고정비 회수 및 이익 창출에 기여하는 금액. 공헌이익 = 판매가 - 단위변동비.', example: '판매가 20,000원, 변동비 12,000원 → 공헌이익 8,000원' },
        { group: '가', name: '마진', abbr: '', def: '판매 수익에서 모든 비용을 뺀 순이익. 넓은 의미로는 "이익"을 뜻함.', example: '10,000원 매입 → 15,000원 판매 → 마진 5,000원' },
        { group: '가', name: '마진율', abbr: '', def: '매출 대비 순이익의 비율. 마진율 = (순이익 ÷ 판매가) × 100. 마진율이 높을수록 수익성이 좋습니다.', example: '판매가 10만원, 순이익 3만원 → 마진율 30%' },
        { group: '가', name: '매입가', abbr: '', def: '상품을 구입(소싱)한 가격. 제조원가 또는 도매 구입가. 마진 계산의 기준이 되는 비용 항목.', example: '공장에서 상품 1개당 5,000원에 매입' },
        { group: '바', name: '부가세 환급', abbr: 'VAT Refund', def: '수출 재화에 대한 영세율 적용으로 매입 시 지불한 부가세 10%를 환급받는 제도. 해외 판매 셀러에게 중요한 비용 절감 요소.', example: '매입가 11만원 (VAT 1만원) → 수출 후 1만원 환급' },
        { group: '바', name: '손익분기점', abbr: 'BEP', def: '이익도 손실도 없는 판매 수량 또는 매출액. 손익분기점 이상 판매해야 실제 이익이 발생합니다.', example: '고정비 50만원, 개당 공헌이익 1만원 → BEP 50개' },
        { group: '차', name: '플랫폼 수수료', abbr: '', def: '판매 플랫폼이 거래 성사 시 부과하는 수수료. 보통 판매가의 일정 % 또는 고정금액. 아마존 8~20%, 쇼피 1~5% 수준.', example: '100달러 상품 판매 → 아마존 수수료 15달러' },
        { group: '차', name: '환율', abbr: 'Exchange Rate', def: '두 통화 간의 교환 비율. 해외 판매에서 외화 판매가를 원화로 환산할 때 사용. 환율 변동이 실제 수익에 영향을 미칩니다.', example: '1 USD = 1,380 KRW → $10 판매 시 13,800원 매출' },
    ];

    let currentAlpha = 'all';
    let currentSearch = '';

    function renderTerms() {
        const q = currentSearch.toLowerCase();
        const filtered = terms.filter(t => {
            const matchSearch = !q || t.name.toLowerCase().includes(q) || t.abbr.toLowerCase().includes(q) || t.def.includes(q);
            const matchAlpha = currentAlpha === 'all' ||
                (currentAlpha === '가' && '가나다라마'.split('').some(c => t.name.startsWith(c))) ||
                (currentAlpha === '바' && '바사아자'.split('').some(c => t.name.startsWith(c))) ||
                (currentAlpha === '차' && '차카타파하환'.split('').some(c => t.name.startsWith(c))) ||
                t.group === currentAlpha;
            return matchSearch && matchAlpha;
        });

        const groups = {};
        filtered.forEach(t => {
            const g = t.group;
            if (!groups[g]) groups[g] = [];
            groups[g].push(t);
        });

        let html = '';
        Object.keys(groups).sort().forEach(g => {
            html += `<div class="term-section"><h2>${g}</h2>`;
            groups[g].forEach(t => {
                html += `<div class="term-card">
                    <div class="term-name">${t.name}${t.abbr ? `<span class="term-abbr">${t.abbr}</span>` : ''}</div>
                    <div class="term-def">${t.def}</div>
                    ${t.example ? `<div class="term-example"><strong>예시</strong> ${t.example}</div>` : ''}
                </div>`;
            });
            html += '</div>';
        });

        document.getElementById('termList').innerHTML = html;
        document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
    }

    function filterTerms() {
        currentSearch = document.getElementById('termSearch').value;
        renderTerms();
    }

    function filterAlpha(a) {
        currentAlpha = a;
        document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderTerms();
    }

    renderTerms();
    </script>
</body>
</html>
