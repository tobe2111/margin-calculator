<html lang="ko">
<head>

    <title>해외 셀러 판매 캘린더 2025 | 블랙프라이데이·쇼핑 시즌 일정 | 유어팀</title>
    <meta name="description" content="해외 셀러 연간 판매 캘린더. 블랙프라이데이, 사이버먼데이, 아마존 프라임데이, 쇼피 9.9 세일 등 주요 쇼핑 이벤트 일정과 준비 전략.">
    <meta name="keywords" content="해외 셀러 캘린더, 블랙프라이데이 날짜, 프라임데이 날짜, 쇼핑 시즌, 해외 판매 일정, 쇼피 세일 일정">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg, #f9fafb); color: var(--text, #1a202c); line-height: 1.6; }
        a { color: inherit; text-decoration: none; }

        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; margin-top: 28px; }
        .filter-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border, #e5e7eb); background: var(--bg-card, #fff); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text, #374151); font-family: inherit; transition: all 0.15s; }
        .filter-btn.active, .filter-btn:hover { background: #0066FF; color: #fff; border-color: #0066FF; }

        .month-section { margin-bottom: 36px; }
        .month-title { font-size: 20px; font-weight: 800; color: var(--text, #111827); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
        .month-title .month-num { width: 40px; height: 40px; background: #0066FF; color: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; flex-shrink: 0; }

        .event-card { background: var(--bg-card, #fff); border: 1px solid var(--border, #e5e7eb); border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; transition: box-shadow 0.15s; }
        .event-card:hover { box-shadow: 0 3px 14px rgba(0,102,255,0.1); }
        .event-date { flex-shrink: 0; text-align: center; background: var(--bg, #f3f4f6); border-radius: 8px; padding: 8px 10px; min-width: 52px; }
        .event-date .ed-month { font-size: 11px; font-weight: 700; color: var(--text-muted, #6b7280); text-transform: uppercase; }
        .event-date .ed-day { font-size: 20px; font-weight: 800; color: var(--text, #111827); line-height: 1.2; }
        .event-content { flex: 1; min-width: 0; }
        .event-content .event-name { font-size: 15px; font-weight: 700; color: var(--text, #111827); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .event-content .event-desc { font-size: 13px; color: var(--text-muted, #6b7280); }
        .event-content .event-tips { margin-top: 8px; font-size: 12px; background: var(--bg, #f9fafb); border-radius: 6px; padding: 8px 12px; color: var(--text-muted, #6b7280); }
        .event-content .event-tips strong { color: #0066FF; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .tag-global { background: #dbeafe; color: #1d4ed8; }
        .tag-sea { background: #d1fae5; color: #065f46; }
        .tag-us { background: #fef3c7; color: #92400e; }
        .tag-jp { background: #fee2e2; color: #991b1b; }
        .tag-kr { background: #ede9fe; color: #5b21b6; }
        .tag-mega { background: #ff6b6b; color: #fff; }
        .upcoming-badge { background: #0066FF; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
    </style>
</head>
<body>
    <header class="sub-header">
        <h1><i class="fas fa-calendar-alt"></i> 해외 셀러 판매 캘린더 2025</h1>
        <p>주요 쇼핑 시즌·이벤트 일정과 준비 전략</p>
    </header>

    <main class="subpage-main">
        <div class="filter-row">
            <button class="filter-btn active" onclick="filterEvents('all', this)">전체</button>
            <button class="filter-btn" onclick="filterEvents('global', this)">글로벌</button>
            <button class="filter-btn" onclick="filterEvents('sea', this)">동남아</button>
            <button class="filter-btn" onclick="filterEvents('us', this)">미국</button>
            <button class="filter-btn" onclick="filterEvents('jp', this)">일본</button>
            <button class="filter-btn" onclick="filterEvents('kr', this)">국내</button>
        </div>

        <div id="calendarList"></div>

        <div style="margin-top:32px;text-align:center;">
            <a href="/guide/" class="back-to-calc" style="background:#6b7280;margin-right:12px;"><i class="fas fa-arrow-left"></i> 가이드 목록</a>
            <a href="/" class="back-to-calc"><i class="fas fa-calculator"></i> 마진 계산기</a>
        </div>
    </main>

    <footer class="sub-footer">
        <div class="footer-links">
            <a href="/">마진 계산기</a>
            <a href="/platforms/">플랫폼 비교</a>
            <a href="/tools/">도구 모음</a>
            <a href="/market/">시장 정보</a>
            <a href="/guide/">셀러 가이드</a>
        </div>
        <p>&copy; 2025 유어팀 글로벌 마진 계산기</p>
        <p class="coupang-notice">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
    </footer>
    <script src="/js/shared-nav.js"></script>
    <script>
    const events = [
        { month: 1, day: '1~15', name: '새해 세일 (New Year Sale)', tags: ['global','sea'], icon: '🎊', desc: '쇼피·라자다에서 새해 첫 번째 메이저 세일. 1월 1일부터 최대 15일까지 진행.', tips: '재고 보충 완료, 쿠폰 미리 설정. 연초 분위기에 맞는 신상품 론칭 최적 시기.' },
        { month: 2, day: '10~14', name: '설 연휴 & 발렌타인데이', tags: ['global','kr'], icon: '❤️', desc: '발렌타인데이(2/14) 시즌. 선물, 뷰티, 식품 카테고리 수요 급증.', tips: '선물 패키지 구성 상품 준비. 포장재 업그레이드로 선물용 어필.' },
        { month: 3, day: '3.3', name: 'Shopee 3.3 세일', tags: ['sea'], icon: '🛒', desc: '쇼피의 연간 최초 메이저 숫자 세일. 주로 뷰티·패션 카테고리 강세.', tips: '쇼피 내 Flash Sale 신청, 번들 상품 구성으로 AOV 높이기.' },
        { month: 3, day: '15~31', name: '라마단 준비 (동남아)', tags: ['sea'], icon: '🌙', desc: '이슬람 라마단 시기(년도별 상이). 말레이시아·인도네시아·필리핀 소비 패턴 변화.', tips: '할랄 인증 상품, 식품류 준비. 라마단 직전 판촉이 효과적.' },
        { month: 4, day: '4.4', name: 'Shopee 4.4 & Lazada 4.4', tags: ['sea'], icon: '🛍', desc: '쇼피/라자다 동시 메이저 세일. 동남아 전역 할인 이벤트.', tips: '최저가 쿠폰 + Flash Deal 신청. 광고비 사전 확보.' },
        { month: 5, day: '5.5', name: 'Shopee 5.5 & 어버이날', tags: ['sea','kr'], icon: '💝', desc: '쇼피 5.5 + 국내 어버이날(5/8) 선물 시즌. 건강기능식품·생활용품 강세.', tips: '선물 카테고리 프로모션 준비. 국내 쿠팡 세일도 병행 고려.' },
        { month: 6, day: '6.6', name: 'Shopee 6.6 Mid-Year Sale', tags: ['sea'], icon: '🌟', desc: '쇼피 연중 최대 세일 중 하나. 전 카테고리 대규모 할인.', tips: '재고 3~4주치 확보. 라이브커머스 활용 집중 홍보 기간.' },
        { month: 7, day: '중순', name: 'Amazon Prime Day', tags: ['us','global'], icon: '📦', desc: '아마존 연중 최대 이벤트(7월 중순, 날짜 매년 발표). 프라임 회원 대상 특가. FBA 셀러에게 절호의 기회.', tips: 'Prime Day 4주 전 FBA 재고 입고 완료. Lightning Deal 신청 필수. 광고비 2~3배 증액.' },
        { month: 7, day: '7.7', name: 'Shopee 7.7 & Lazada 7.7', tags: ['sea'], icon: '🎉', desc: '동남아 7월 메이저 세일. Prime Day와 겹치는 글로벌 쇼핑 주간.', tips: '아마존 + 쇼피 동시 진행 가능. 물류 여력 계획 필수.' },
        { month: 8, day: '8.8', name: 'Shopee 8.8 Live Sale', tags: ['sea'], icon: '🔴', desc: '쇼피 8.8. 라이브커머스 특화 세일. TikTok Shop도 대규모 이벤트.', tips: '라이브 방송 스케줄 확보. KOL/인플루언서 협업 이벤트 시기.' },
        { month: 9, day: '9.9', name: 'Shopee 9.9 Super Shopping Day', tags: ['sea'], icon: '🏆', desc: '쇼피 연중 최대 세일 이벤트 중 하나. 동남아 전역 거래량이 급증.', tips: '6.6 다음으로 중요한 세일. 반드시 Flash Sale 신청. 최소 재고 300% 증대.' },
        { month: 10, day: '10.10', name: 'Shopee/Lazada 10.10', tags: ['sea'], icon: '🎊', desc: '동남아 10월 메이저 세일. Q4 시작을 알리는 대규모 프로모션.', tips: 'Q4 판매 전략의 시작. 10.10 성과가 11.11 매출 예측의 기준이 됨.' },
        { month: 11, day: '11.11', name: '광군제 & 11.11 Grand Sale', tags: ['sea','global'], icon: '🌍', desc: '전 세계 최대 쇼핑 이벤트. 쇼피·라자다·타오바오 등 동시 진행. 연간 최대 매출 발생일.', tips: '연중 최대 물량 준비(통상 평소의 5~10배). 재고 부족 시 기회 손실 큼. 광고 예산 최대 집행 일.' },
        { month: 11, day: '넷째 목요일+1', name: 'Black Friday / Cyber Monday', tags: ['us','global'], icon: '🖤', desc: '미국 최대 쇼핑 시즌. 블랙프라이데이(11월 넷째 금요일) + 사이버먼데이(이후 월요일).', tips: 'Amazon, eBay 모두 대규모 프로모션. 미국 판매 셀러는 9월부터 재고 준비.' },
        { month: 12, day: '12.12', name: '12.12 Year-End Sale', tags: ['sea','global'], icon: '🎄', desc: '동남아 연말 최후 메이저 세일. 11.11 이후 마지막 대규모 쇼핑 기회.', tips: '크리스마스와 겹쳐 선물 카테고리 강세. 12월은 배송 지연에 주의.' },
        { month: 12, day: '1~25', name: '크리스마스 시즌', tags: ['us','global'], icon: '🎅', desc: '미국·유럽 크리스마스 선물 시즌. 11월~12월 중순이 최대 판매 기간.', tips: '선물 포장 서비스 제공으로 차별화. 크리스마스 전 배송 보장 마감일 공지 필수.' },
    ];

    let currentFilter = 'all';

    function renderCalendar() {
        const filtered = events.filter(e => currentFilter === 'all' || e.tags.includes(currentFilter));
        const months = {};
        filtered.forEach(e => {
            if (!months[e.month]) months[e.month] = [];
            months[e.month].push(e);
        });

        const monthNames = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
        const now = new Date();
        const curMonth = now.getMonth() + 1;

        let html = '';
        Object.keys(months).sort((a,b) => a-b).forEach(m => {
            html += `<div class="month-section">
                <div class="month-title">
                    <div class="month-num">${m}</div>
                    ${monthNames[m]}
                    ${parseInt(m) === curMonth ? '<span class="upcoming-badge">이번 달</span>' : ''}
                </div>`;
            months[m].forEach(e => {
                const tagsHTML = e.tags.map(t => {
                    const labels = { global:'글로벌', sea:'동남아', us:'미국', jp:'일본', kr:'국내' };
                    return `<span class="tag tag-${t}">${labels[t]}</span>`;
                }).join(' ');
                html += `<div class="event-card">
                    <div class="event-date">
                        <div class="ed-month">${monthNames[m]}</div>
                        <div class="ed-day">${e.day}</div>
                    </div>
                    <div class="event-content">
                        <div class="event-name">${e.icon} ${e.name} ${tagsHTML}</div>
                        <div class="event-desc">${e.desc}</div>
                        <div class="event-tips"><strong>준비 전략</strong> ${e.tips}</div>
                    </div>
                </div>`;
            });
            html += '</div>';
        });

        document.getElementById('calendarList').innerHTML = html || '<p style="text-align:center;color:var(--text-muted,#9ca3af);padding:40px 0;">해당 지역의 이벤트가 없습니다.</p>';
    }

    function filterEvents(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCalendar();
    }

    renderCalendar();
    </script>
</body>
</html>
